// UI
const logEl = document.getElementById('log');
const seedBtn = document.getElementById('seedBtn');
const seedStoresBtn = document.getElementById('seedStoresBtn');
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');
document.getElementById('count').textContent = products.length;

function log(msg, type='info') {
  const line = document.createElement('div');
  line.className = 'log-line log-' + type;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

seedBtn.addEventListener('click', async () => {
  seedBtn.disabled = true;
  seedStoresBtn.disabled = true;
  logEl.style.display = 'block';
  progressContainer.style.display = 'block';
  log('⏳ بدء الرفع...', 'info');

  let ok = 0, fail = 0;
  for (let i = 0; i < products.length; i++) {
    const p = products[i];
    try {
      await setDoc(doc(db, 'products', p.slug), {
        ...p,
        image: `/images/${p.slug}.webp`,
        updatedAt: serverTimestamp(),
        createdAt: serverTimestamp()
      });
      ok++;
      log(`✓ ${p.name} — ${p.price.toLocaleString()} EGP`, 'ok');
    } catch (e) {
      fail++;
      log(`✗ ${p.name} — ${e.message}`, 'err');
    }
    progressBar.style.width = ((i + 1) / products.length * 100) + '%';
  }

  log('', 'info');
  log(`✅ تم رفع ${ok} منتج${fail ? ` — فشل ${fail}` : ''}`, fail ? 'err' : 'ok');
  seedBtn.textContent = '✓ تم';
  seedStoresBtn.disabled = false;
});

seedStoresBtn.addEventListener('click', async () => {
  seedStoresBtn.disabled = true;
  logEl.style.display = 'block';
  log('⏳ بدء رفع الفروع...', 'info');
  let ok = 0, fail = 0;
  for (const s of stores) {
    try {
      const { id, ...data } = s;
      await setDoc(doc(db, 'stores', id), { ...data, updatedAt: serverTimestamp(), createdAt: serverTimestamp() });
      ok++;
      log(`✓ ${s.name} — ${s.nameAr}`, 'ok');
    } catch (e) {
      fail++;
      log(`✗ ${s.name} — ${e.message}`, 'err');
    }
  }
  log(`✅ تم رفع ${ok} فرع${fail ? ` — فشل ${fail}` : ''}`, fail ? 'err' : 'ok');
  seedStoresBtn.textContent = '✓ تم';
});
